<!DOCTYPE html><html lang="ja"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>NINJA AIRS 管理画面</title><style>
:root{--ink:#111217;--muted:#667085;--line:#e6e8ee;--bg:#f7f8fb;--pink:#ff3bad;--blue:#18b9ff;--dark:#08090d;--grad:linear-gradient(100deg,var(--pink),var(--blue));}*{box-sizing:border-box;margin:0;padding:0}body{font-family:-apple-system,BlinkMacSystemFont,"Noto Sans JP",Meiryo,sans-serif;background:var(--bg);color:var(--ink);line-height:1.7}.login,.app{max-width:1080px;margin:auto;padding:28px}.panel{background:#fff;border:1px solid var(--line);border-radius:24px;padding:28px;box-shadow:0 18px 48px rgba(0,0,0,.06);margin:18px 0}h1{font-size:2rem}h2{font-size:1.25rem;margin-bottom:14px}.muted{color:var(--muted);font-weight:700}.grid{display:grid;grid-template-columns:1fr 1fr;gap:18px}.field{margin:14px 0}label{display:block;font-weight:900;margin-bottom:6px}input,textarea{width:100%;border:1px solid var(--line);border-radius:14px;padding:13px 14px;font:inherit;background:#fff}textarea{min-height:120px}.btn{border:0;border-radius:999px;background:var(--dark);color:#fff;font-weight:950;padding:13px 22px;cursor:pointer}.btn2{background:#fff;color:var(--dark);border:2px solid var(--dark)}.btnGrad{background:var(--grad)}.top{display:flex;justify-content:space-between;align-items:center;gap:16px}.gallery{display:grid;grid-template-columns:repeat(5,1fr);gap:14px}.photoBox{background:#fff;border:1px solid var(--line);border-radius:18px;padding:12px}.photoBox img{width:100%;aspect-ratio:4/3;object-fit:cover;border-radius:12px;background:#eee}.actions{display:flex;gap:10px;flex-wrap:wrap;margin-top:18px}.hidden{display:none!important}.notice{padding:12px 14px;border-radius:14px;background:#eefaf4;color:#057a3d;font-weight:800;margin-top:12px}.danger{background:#fff1f3;color:#b42318}.small{font-size:.85rem}.previewLink{color:#0974d8;font-weight:900}@media(max-width:800px){.grid,.gallery{grid-template-columns:1fr}.top{display:block}.login,.app{padding:16px}}
</style></head><body>
<div id="login" class="login"><div class="panel"><h1>NINJA AIRS 管理ログイン</h1><p class="muted">管理者だけが写真・文言を変更できます。</p><div class="field"><label>メールアドレス</label><input id="email" type="email" placeholder="admin@example.com"></div><div class="field"><label>パスワード</label><input id="password" type="password" placeholder="パスワード"></div><div class="actions"><button class="btn btnGrad" id="loginBtn">ログイン</button><a class="btn btn2" href="index.html">公開サイトへ戻る</a></div><div id="loginMsg"></div></div><div class="panel"><h2>初回設定が必要です</h2><p class="muted">firebase-config.js にFirebase設定と管理者メールを入れてください。Firebase未設定のままではログインできません。</p></div></div>
<div id="app" class="app hidden"><div class="top"><div><h1>NINJA AIRS 管理画面</h1><p class="muted">写真を選んで保存すると、公開サイトの活動イメージが差し替わります。</p></div><div class="actions"><a class="btn btn2" href="index.html" target="_blank">公開サイトを見る</a><button class="btn" id="logoutBtn">ログアウト</button></div></div>
<div class="panel"><h2>トップ文言・連絡先</h2><div class="grid"><div class="field"><label>メインコピー</label><textarea id="heroCopy"></textarea></div><div class="field"><label>説明文</label><textarea id="heroLead"></textarea></div><div class="field"><label>LINE URL</label><input id="lineUrl" type="url"></div><div class="field"><label>メールアドレス</label><input id="mail" type="email"></div></div></div>
<div class="panel"><h2>活動イメージ写真</h2><div class="gallery" id="galleryEditor"></div><p class="muted small">画像はFirebase Storageに保存されます。公開サイトは保存後のURLを読み込みます。</p></div>
<div class="panel"><h2>保存</h2><div class="actions"><button class="btn btnGrad" id="saveBtn">公開サイトへ保存</button></div><div id="saveMsg"></div></div></div>
<script type="module">
import { firebaseConfig, ADMIN_EMAILS } from './firebase-config.js';
const defaults={heroCopy:'自ら考え、動き、<br>未来をつかむ。',heroLead:'滋賀県大津市を中心に活動するU15バスケットボールクラブ。技術だけでなく、判断力・主体性・人として成長する力を育てます。',lineUrl:'https://line.me/ti/p/i7YQJwh_U2',mail:'example@example.com',gallery:[{title:'遠征・挑戦',url:'assets/activity-01-ensei.jpeg'},{title:'大会・実戦経験',url:'assets/activity-02-match.jpeg'},{title:'仲間と成長',url:'assets/activity-03-team.jpeg'},{title:'チームワーク',url:'assets/activity-04-circle.jpeg'},{title:'日々の練習',url:'assets/activity-05-practice.jpeg'}]};
const msg=(id,text,bad=false)=>{document.getElementById(id).innerHTML=`<div class="notice ${bad?'danger':''}">${text}</div>`};
if(!firebaseConfig.apiKey || firebaseConfig.apiKey.startsWith('PASTE')) msg('loginMsg','Firebase設定が未入力です。firebase-config.jsを設定してください。',true);
const { initializeApp } = await import('https://www.gstatic.com/firebasejs/10.12.5/firebase-app.js');
const { getAuth, signInWithEmailAndPassword, signOut, onAuthStateChanged } = await import('https://www.gstatic.com/firebasejs/10.12.5/firebase-auth.js');
const { getFirestore, doc, getDoc, setDoc, serverTimestamp } = await import('https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore.js');
const { getStorage, ref, uploadBytes, getDownloadURL } = await import('https://www.gstatic.com/firebasejs/10.12.5/firebase-storage.js');
const app=initializeApp(firebaseConfig); const auth=getAuth(app); const db=getFirestore(app); const storage=getStorage(app);
let data={...defaults}; let selectedFiles={};
function fill(d){data={...defaults,...d,gallery:(d&&d.gallery)||defaults.gallery};document.getElementById('heroCopy').value=data.heroCopy;document.getElementById('heroLead').value=data.heroLead;document.getElementById('lineUrl').value=data.lineUrl;document.getElementById('mail').value=data.mail;renderGallery();}
function renderGallery(){document.getElementById('galleryEditor').innerHTML=data.gallery.map((g,i)=>`<div class="photoBox"><img id="img${i}" src="${g.url}"><div class="field"><label>タイトル</label><input id="title${i}" value="${g.title}"></div><div class="field"><label>写真変更</label><input id="file${i}" type="file" accept="image/*"></div></div>`).join('');data.gallery.forEach((g,i)=>{document.getElementById('file'+i).addEventListener('change',e=>{const f=e.target.files[0]; if(!f) return; selectedFiles[i]=f; document.getElementById('img'+i).src=URL.createObjectURL(f);});});}
document.getElementById('loginBtn').onclick=async()=>{try{await signInWithEmailAndPassword(auth,document.getElementById('email').value,document.getElementById('password').value)}catch(e){msg('loginMsg','ログインできません。メール・パスワードを確認してください。',true)}};
document.getElementById('logoutBtn').onclick=()=>signOut(auth);
onAuthStateChanged(auth,async user=>{if(!user){document.getElementById('login').classList.remove('hidden');document.getElementById('app').classList.add('hidden');return} if(!ADMIN_EMAILS.includes(user.email)){await signOut(auth);msg('loginMsg','このメールアドレスは管理者として許可されていません。',true);return} document.getElementById('login').classList.add('hidden');document.getElementById('app').classList.remove('hidden');const snap=await getDoc(doc(db,'site','content'));fill(snap.exists()?snap.data():defaults);});
document.getElementById('saveBtn').onclick=async()=>{try{const gallery=[];for(let i=0;i<data.gallery.length;i++){let url=data.gallery[i].url;if(selectedFiles[i]){const ext=selectedFiles[i].name.split('.').pop()||'jpg';const path=`gallery/activity-${String(i+1).padStart(2,'0')}-${Date.now()}.${ext}`;const r=ref(storage,path);await uploadBytes(r,selectedFiles[i]);url=await getDownloadURL(r);}gallery.push({title:document.getElementById('title'+i).value,url});}const payload={heroCopy:document.getElementById('heroCopy').value,heroLead:document.getElementById('heroLead').value,lineUrl:document.getElementById('lineUrl').value,mail:document.getElementById('mail').value,gallery,updatedAt:serverTimestamp()};await setDoc(doc(db,'site','content'),payload,{merge:true});selectedFiles={};fill(payload);msg('saveMsg','保存しました。公開サイトを更新してください。')}catch(e){console.error(e);msg('saveMsg','保存に失敗しました。Firebase設定・権限ルールを確認してください。',true)}};
</script></body></html>
